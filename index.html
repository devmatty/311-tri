<!-- v1 -->



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>311 Triage Tool</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e4dc; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  .shell { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  .wordmark { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: #5a5a52; text-transform: uppercase; margin-bottom: 2.5rem; }
  .wordmark span { color: #c8b97a; }

  h1 { font-size: 2rem; font-weight: 600; line-height: 1.15; color: #f0ece3; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.9rem; color: #6b6b62; margin-bottom: 2.5rem; }

  .upload-zone {
    border: 1px dashed #2e2e28;
    border-radius: 12px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: #c8b97a; background: rgba(200,185,122,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2rem; color: #3a3a34; margin-bottom: 0.75rem; }
  .upload-label { font-size: 0.95rem; color: #6b6b62; }
  .upload-label strong { color: #c8b97a; font-weight: 500; }
  .upload-hint { font-size: 0.78rem; color: #3a3a34; margin-top: 0.4rem; font-family: 'DM Mono', monospace; }

  .progress-bar { height: 2px; background: #1a1a16; border-radius: 1px; margin: 1.5rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #c8b97a; width: 0%; transition: width 0.4s; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 2rem 0; }
  .stat { background: #161613; border: 1px solid #222; border-radius: 10px; padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #4a4a44; font-family: 'DM Mono', monospace; margin-bottom: 0.4rem; }
  .stat-value { font-size: 2rem; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 0.78rem; color: #4a4a44; margin-top: 0.3rem; }
  .stat.red .stat-value { color: #e05252; }
  .stat.amber .stat-value { color: #c8b97a; }
  .stat.green .stat-value { color: #6aaa7a; }

  .section { margin-bottom: 2rem; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: 'DM Mono', monospace; font-weight: 500;
    padding: 0.6rem 0; border-bottom: 1px solid #1e1e1a; margin-bottom: 1rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.red { background: #e05252; }
  .dot.amber { background: #c8b97a; }
  .dot.green { background: #6aaa7a; }
  .section-count { margin-left: auto; color: #3a3a34; }

  .request-card {
    background: #141412; border: 1px solid #1e1e1a; border-radius: 8px;
    padding: 0.9rem 1rem; margin-bottom: 8px;
    display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start;
  }
  .req-type { font-size: 0.88rem; font-weight: 500; color: #d8d4cc; margin-bottom: 3px; }
  .req-meta { font-size: 0.75rem; color: #4a4a44; font-family: 'DM Mono', monospace; }
  .req-action { font-size: 0.75rem; color: #6b6b62; margin-top: 4px; font-style: italic; }
  .days-badge {
    font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  }
  .days-badge.red { background: rgba(224,82,82,0.12); color: #e05252; border: 1px solid rgba(224,82,82,0.2); }
  .days-badge.amber { background: rgba(200,185,122,0.1); color: #c8b97a; border: 1px solid rgba(200,185,122,0.2); }
  .days-badge.green { background: rgba(106,170,122,0.1); color: #6aaa7a; border: 1px solid rgba(106,170,122,0.2); }

  .exec-brief {
    background: #161613; border: 1px solid #2a2a24; border-left: 3px solid #c8b97a;
    border-radius: 0 8px 8px 0; padding: 1.25rem 1.5rem; margin-top: 2rem;
  }
  .exec-brief-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #c8b97a; font-family: 'DM Mono', monospace; margin-bottom: 0.6rem; }
  .exec-brief p { font-size: 0.88rem; color: #8a8a80; line-height: 1.7; }
  .exec-brief p + p { margin-top: 0.6rem; }

  .show-more { background: none; border: 1px solid #222; border-radius: 6px; padding: 0.5rem 1rem; color: #4a4a44; font-size: 0.78rem; cursor: pointer; width: 100%; margin-top: 4px; transition: border-color 0.15s, color 0.15s; font-family: 'DM Mono', monospace; }
  .show-more:hover { border-color: #3a3a34; color: #6b6b62; }

  .export-btn {
    background: #c8b97a; color: #0f0f0f; border: none; border-radius: 8px;
    padding: 0.65rem 1.5rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    margin-top: 1.5rem; display: inline-flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .export-btn:hover { background: #d4c68c; }

  .hidden { display: none; }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="shell">
  <div class="wordmark">311 <span>Triage</span> Tool — Toronto Open Data</div>
  <h1>Service Request<br>Intelligence Brief</h1>
  <p class="subtitle">Upload a Toronto 311 CSV export. Get a prioritized triage brief in seconds.</p>

  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".csv" />
    <div class="upload-icon"><i class="ti ti-upload"></i></div>
    <div class="upload-label"><strong>Drop your 311 CSV here</strong> or click to browse</div>
    <div class="upload-hint">open.toronto.ca → 311-service-requests-customer-initiated</div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div id="results" class="hidden"></div>
</div>

<script>
const REFERENCE_DATE = new Date('2026-05-19');

function daysBetween(dateStr) {
  try {
    const d = new Date(dateStr.substring(0, 19).replace(' ', 'T'));
    return Math.floor((REFERENCE_DATE - d) / 86400000);
  } catch { return null; }
}

function getAction(type, status, days) {
  const t = type.toLowerCase();
  if (t.includes('watermain') || t.includes('sewer') || t.includes('water service')) return 'Safety-critical — escalate to District Ops for immediate scheduling';
  if (t.includes('tree emergency')) return 'Emergency designation stalled — escalate to Forestry Ops supervisor';
  if (t.includes('property standards') || t.includes('multi-tenant')) return 'Tenant safety risk — request investigator status update';
  if (t.includes('pothole') || t.includes('road damage')) return 'Liability exposure — flag to Road Ops district manager';
  if (t.includes('plow damage') || t.includes('boulevard plow')) return 'Seasonal backlog — request repair scheduling confirmation';
  if (t.includes('graffiti')) return 'Volume item — batch with nearby graffiti requests for efficiency';
  if (t.includes('pruning') || t.includes('general pruning')) return status === 'New' ? 'Never assigned — route to Forestry Ops queue today' : 'Stalled — confirm Forestry Ops capacity for spring season';
  if (t.includes('parking')) return 'Request ROW enforcement assignment if still outstanding';
  if (t.includes('noise')) return 'Bylaw complaint — verify closure status with MLS';
  if (status === 'New' && days > 30) return 'Never assigned — route to appropriate division immediately';
  return 'Review status with division; confirm next action date';
}

function parseCSV(text) {
  const lines = text.split('\n');
  if (lines.length < 2) return [];
  const header = lines[0].split(',').map(h => h.trim().replace(/\r/g,''));
  const idx = {
    date: header.indexOf('Creation Date'),
    status: header.indexOf('Status'),
    type: header.indexOf('Service Request Type'),
    ward: header.indexOf('Ward'),
    division: header.indexOf('Division'),
    section: header.indexOf('Section'),
  };
  const records = [];
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split(',');
    if (row.length < 5) continue;
    const status = (row[idx.status] || '').trim();
    if (status !== 'In Progress' && status !== 'New') continue;
    const days = daysBetween((row[idx.date] || '').trim());
    if (days === null) continue;
    records.push({
      status,
      type: (row[idx.type] || '').trim(),
      ward: (row[idx.ward] || '').trim(),
      division: (row[idx.division] || '').trim(),
      section: (row[idx.section] || '').trim(),
      days,
    });
  }
  return records;
}

function buildBrief(records) {
  const escalate = records.filter(r => r.days >= 60).sort((a,b) => b.days - a.days);
  const atRisk   = records.filter(r => r.days >= 20 && r.days < 60).sort((a,b) => b.days - a.days);
  const onTrack  = records.filter(r => r.days < 20).sort((a,b) => b.days - a.days);

  const topDiv = {};
  escalate.forEach(r => { topDiv[r.division] = (topDiv[r.division]||0)+1; });
  const topDivs = Object.entries(topDiv).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([d])=>d).join(' and ');

  const typeMap = {};
  escalate.forEach(r => { typeMap[r.type] = (typeMap[r.type]||0)+1; });
  const topType = Object.entries(typeMap).sort((a,b)=>b[1]-a[1])[0];

  return { escalate, atRisk, onTrack, topDivs, topType };
}

function renderCard(r, tier) {
  const action = getAction(r.type, r.status, r.days);
  return `<div class="request-card">
    <div>
      <div class="req-type">${r.type}</div>
      <div class="req-meta">${r.ward} · ${r.section || r.division} · ${r.status}</div>
      <div class="req-action">${action}</div>
    </div>
    <div class="days-badge ${tier}">${r.days}d</div>
  </div>`;
}

function renderSection(label, tier, items, showCount = 6) {
  const shown = items.slice(0, showCount);
  const rest = items.length - showCount;
  let html = `<div class="section fade-in">
    <div class="section-header">
      <span class="dot ${tier}"></span>
      ${label}
      <span class="section-count">${items.length.toLocaleString()} requests</span>
    </div>`;
  shown.forEach(r => { html += renderCard(r, tier); });
  if (rest > 0) html += `<button class="show-more" onclick="this.closest('.section').querySelectorAll('.more-card').forEach(el=>el.classList.toggle('hidden'));this.textContent=this.textContent.includes('Show')? 'Hide additional requests':'Show ${rest} more requests'">Show ${rest} more requests</button>`;
  const moreCards = items.slice(showCount).map(r => `<div class="more-card hidden">${renderCard(r, tier)}</div>`).join('');
  html += moreCards + '</div>';
  return html;
}

function render(records) {
  const { escalate, atRisk, onTrack, topDivs, topType } = buildBrief(records);
  const total = records.length;

  const summaryHTML = `
    <div class="summary-grid fade-in">
      <div class="stat red">
        <div class="stat-label">Escalate now</div>
        <div class="stat-value">${escalate.length.toLocaleString()}</div>
        <div class="stat-sub">60+ days open</div>
      </div>
      <div class="stat amber">
        <div class="stat-label">At risk</div>
        <div class="stat-value">${atRisk.length.toLocaleString()}</div>
        <div class="stat-sub">20–59 days open</div>
      </div>
      <div class="stat green">
        <div class="stat-label">On track</div>
        <div class="stat-value">${onTrack.length.toLocaleString()}</div>
        <div class="stat-sub">Under 20 days</div>
      </div>
    </div>`;

  const escPct = Math.round(escalate.length / total * 100);
  const briefHTML = `<div class="exec-brief fade-in">
    <div class="exec-brief-label">Executive summary</div>
    <p>${total.toLocaleString()} open service requests remain active as of May 19, 2026, with ${escPct}% (${escalate.length.toLocaleString()}) unresolved for 60+ days — a critical backlog concentrated in ${topDivs || 'Transportation Services'}.</p>
    <p>Immediate escalation priority: ${topType ? `${topType[0]} (${topType[1].toLocaleString()} open files)` : 'safety-critical files'} and any New requests with no assignment after 30+ days, indicating a triage failure at intake rather than a capacity problem.</p>
  </div>`;

  const exportBtn = `<button class="export-btn" onclick="exportCSV(window._records)"><i class="ti ti-download"></i> Export triage brief as CSV</button>`;

  document.getElementById('results').innerHTML =
    summaryHTML +
    renderSection('🔴 Escalate now — 60+ days, no resolution', 'red', escalate) +
    renderSection('🟡 At risk — 20–59 days stalled', 'amber', atRisk) +
    renderSection('🟢 On track — under 20 days', 'green', onTrack) +
    briefHTML + exportBtn;

  document.getElementById('results').classList.remove('hidden');
  window._records = records;
}

function exportCSV(records) {
  const { escalate, atRisk, onTrack } = buildBrief(records);
  const rows = [['Tier','Type','Ward','Division','Section','Days Open','Status','Recommended Action']];
  const add = (tier, list) => list.forEach(r => rows.push([tier, r.type, r.ward, r.division, r.section, r.days, r.status, getAction(r.type, r.status, r.days)]));
  add('ESCALATE NOW', escalate);
  add('AT RISK', atRisk);
  add('ON TRACK', onTrack);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `311_triage_brief_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function processFile(file) {
  const fill = document.getElementById('progressFill');
  fill.style.width = '30%';
  const reader = new FileReader();
  reader.onload = (e) => {
    fill.style.width = '60%';
    setTimeout(() => {
      const text = e.target.result;
      const records = parseCSV(text);
      fill.style.width = '100%';
      setTimeout(() => { fill.style.width = '0%'; render(records); }, 300);
    }, 50);
  };
  reader.readAsText(file, 'latin1');
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
